<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table{
            border-collapse: collapse;
        }
        td, th{
            border: 1px solid red;
            padding: 3px 10px;
        }

        th{
            background-color: aqua;
        }
    </style>
</head>

<body>
    <main>
        <table>
            <thead>
                <tr>
                    <th>One</th>
                    <th>Two</th>
                    <th>Three</th>
                    <th>Four</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Bangla</td>
                    <td>English</td>
                    <td>Math</td>
                    <td>History</td>
                </tr>
                <tr>
                    <td>Mango</td>
                    <td>Jack</td>
                    <td>Grap</td>
                    <td>Apple</td>
                </tr>
                <tr>
                    <td>Lily</td>
                    <td>Sun</td>
                    <td>Rose</td>
                    <td>Merigold</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td style="font-size: small; text-align: center;" colspan="4">this is a footer</td>
                </tr>
            </tfoot>
        </table>
    </main>
</body>

</html>
